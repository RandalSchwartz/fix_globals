name: fix_globals
description: A command-line utility to cleanly reinstall and refresh all globally activated Dart and Flutter packages from their original sources (pub, path, git, and custom registries).
version: 1.1.0
repository: https://github.com/RandalSchwartz/fix_globals
issue_tracker: https://github.com/RandalSchwartz/fix_globals/issues

platforms:
  linux:
  macos:
  windows:


executables:
  fix-globals: fix_globals

environment:
  sdk: ^3.12.0

# Add regular dependencies here.
dependencies:
  args: ^2.7.0
  path: ^1.9.0

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.6
